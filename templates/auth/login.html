{% extends "base.html" %}

{% block title %}Login - SecureAuth{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 2rem auto;">
    <div class="card">
        <div class="card-header">
            <h2>Welcome Back</h2>
            <p>Please login to your account</p>
        </div>
        
        <form id="loginForm" method="POST" action="{{ url_for('api_login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="form-group">
                <label class="form-label" for="username_or_email">Username or Email</label>
                <input type="text" id="username_or_email" name="username_or_email" class="form-control" required placeholder="Enter username or email">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
            </div>
            
            <div id="loginMessage" style="margin-bottom: 1rem; text-align: center; font-weight: 500;"></div>
            
            <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Login</button>
        </form>
        
        <div class="text-center mt-1">
            <p style="color: var(--text-muted); font-size: 0.9rem;">
                Don't have an account? <a href="{{ url_for('register_page') }}">Register here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const msg = document.getElementById('loginMessage');
    
    btn.disabled = true;
    btn.innerHTML = 'Logging in...';
    
    const formData = new FormData(this);
    
    fetch(this.action, {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': csrfToken
        }
    })
    .then(response => response.json())
    .then(data => {
        if(data.success) {
            msg.style.color = 'var(--success-color)';
            msg.innerText = data.message;
            setTimeout(() => {
                window.location.href = "{{ url_for('dashboard') }}";
            }, 1000);
        } else {
            msg.style.color = 'var(--error-color)';
            msg.innerText = data.message;
            btn.disabled = false;
            btn.innerHTML = 'Login';
        }
    })
    .catch(err => {
        msg.style.color = 'var(--error-color)';
        msg.innerText = 'An error occurred. Please try again.';
        btn.disabled = false;
        btn.innerHTML = 'Login';
    });
});
</script>
{% endblock %}
